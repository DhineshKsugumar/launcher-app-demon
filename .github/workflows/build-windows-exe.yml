name: Build Launcher Daemon Setup

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-setup:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare installer files
        run: |
          $stage = "C:\LauncherDaemonBuild"
          New-Item -ItemType Directory -Path $stage -Force
          Copy-Item main.py, requirements.txt, run_daemon.bat, launch_daemon.py $stage
          New-Item -ItemType Directory -Path "$stage\installer" -Force
          Copy-Item installer\install.bat "$stage\installer"
          New-Item -ItemType Directory -Path "$stage\uninstall" -Force
          Copy-Item uninstall\uninstall.bat "$stage\uninstall"

      - name: Build setup ZIP
        run: |
          Compress-Archive -Path "C:\LauncherDaemonBuild\*" -DestinationPath LauncherDaemon-Setup.zip -Force

      - name: Upload LauncherDaemon-Setup
        uses: actions/upload-artifact@v4
        with:
          name: LauncherDaemon-Setup
          path: LauncherDaemon-Setup.zip
